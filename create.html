<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 创建旅行 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .wizard-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; max-width: 900px; margin: 0 auto; padding: 0 24px; align-items: start; }
  .preview-panel { background: linear-gradient(135deg, #F8FAFC, #F0F4FF); border: 1px solid rgba(0,82,255,.08); border-radius: var(--radius-xl); padding: 28px 24px; position: sticky; top: 100px; display: none; }
  .step-dots { display: flex; gap: 4px; align-items: center; justify-content: center; margin-bottom: 32px; }
  .step-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; transition: all .3s; }
  .step-dot.done { background: var(--success); color: #fff; }
  .step-dot.current { background: var(--accent); color: #fff; box-shadow: 0 0 0 4px rgba(0,82,255,.15); }
  .step-dot.next { background: var(--muted); color: var(--muted-fg); }
  .step-line { width: 24px; height: 2px; background: var(--border); border-radius: 1px; }
  .step-line.done { background: var(--success); }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px 36px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.03); max-width: 520px; margin: 0 auto; animation: fadeInUp .35s ease-out; }
  .question-card h2 { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 24px; line-height: 1.3; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 8px; }
  .chip-btn { padding: 12px 20px; border-radius: var(--radius); font-size: 15px; background: var(--muted); border: 1.5px solid var(--border); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .chip-btn:hover { border-color: var(--accent); background: rgba(0,82,255,.04); }
  .chip-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .style-chip { flex-direction: column; padding: 16px 12px; min-width: 100px; gap: 8px; font-size: 13px; }
  .style-chip .style-icon { font-size: 28px; }
  .main-input { width: 100%; max-width: 360px; padding: 16px 20px; border: 2px solid var(--border); border-radius: var(--radius-lg); font-size: 18px; text-align: center; outline: none; font-family: var(--font-body); transition: border-color .2s; }
  .main-input:focus { border-color: var(--accent); }
  .suggest-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
  .suggest-tag { padding: 8px 16px; border-radius: 999px; font-size: 13px; background: var(--muted); border: 1px solid var(--border); cursor: pointer; transition: all .15s; }
  .suggest-tag:hover { border-color: var(--accent); background: rgba(0,82,255,.05); }
  .btn-next { margin-top: 24px; }
  @media (max-width: 768px) {
    .wizard-layout { grid-template-columns: 1fr; }
    .preview-panel { display: none !important; }
    .question-card { padding: 28px 20px; }
    .question-card h2 { font-size: 1.4rem; }
  }
</style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">

<header style="padding:16px 0;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="font-family:var(--font-display);font-size:18px;color:var(--fg);text-decoration:none;display:flex;align-items:center;gap:8px;">
      <span style="width:32px;height:32px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;"><i class="fas fa-map-marker-alt"></i></span>Journey
    </a>
    <span style="font-size:13px;color:var(--muted-fg);">✨ AI 旅行规划师</span>
    <a href="index.html" style="color:var(--muted-fg);text-decoration:none;font-size:13px;">取消</a>
  </div>
</header>

<main class="container" style="flex:1;padding-top:24px;padding-bottom:80px;">
  <!-- Phase 1: Onboarding -->
  <div id="onboarding" style="text-align:center;padding-top:32px;">
    <div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,82,255,.2);">✨</div>
    <h1 style="font-family:var(--font-display);font-size:2rem;margin-bottom:8px;">AI 旅行<span class="gradient-text">规划师</span></h1>
    <p style="color:var(--muted-fg);font-size:15px;margin-bottom:36px;">30 秒，AI 帮你定制完美旅程</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;margin:0 auto 28px;">
      <div style="background:rgba(0,82,255,.04);border-radius:var(--radius-lg);padding:16px;text-align:left;"><div style="font-size:20px;margin-bottom:4px;">📍</div><div style="font-weight:600;font-size:13px;">推荐目的地</div><div style="font-size:11px;color:var(--muted-fg);">智能匹配偏好</div></div>
      <div style="background:rgba(16,185,129,.04);border-radius:var(--radius-lg);padding:16px;text-align:left;"><div style="font-size:20px;margin-bottom:4px;">🗺</div><div style="font-weight:600;font-size:13px;">每日路线</div><div style="font-size:11px;color:var(--muted-fg);">最优路径生成</div></div>
      <div style="background:rgba(245,158,11,.04);border-radius:var(--radius-lg);padding:16px;text-align:left;"><div style="font-size:20px;margin-bottom:4px;">💰</div><div style="font-weight:600;font-size:13px;">预算估算</div><div style="font-size:11px;color:var(--muted-fg);">智能花费规划</div></div>
      <div style="background:rgba(139,92,246,.04);border-radius:var(--radius-lg);padding:16px;text-align:left;"><div style="font-size:20px;margin-bottom:4px;">🎒</div><div style="font-weight:600;font-size:13px;">行李清单</div><div style="font-size:11px;color:var(--muted-fg);">天气自动适配</div></div>
    </div>
    <p style="font-size:12px;color:var(--muted-fg);margin-bottom:10px;">不知道去哪？试试这些</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;" id="templates"></div>
    <button class="btn btn-primary btn-lg" onclick="startWizard()" style="font-size:17px;padding:16px 40px;">✨ 开始规划 <i class="fas fa-arrow-right"></i></button>
    <p style="font-size:12px;color:var(--muted-fg);margin-top:10px;">预计 30 秒完成</p>
  </div>

  <!-- Phase 2: Wizard -->
  <div id="wizard" style="display:none;">
    <!-- Step dots -->
    <div class="step-dots" id="stepDots"></div>
    <!-- Layout: question + preview -->
    <div class="wizard-layout">
      <div id="questionArea"></div>
      <div class="preview-panel" id="previewPanel">
        <h3 style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-fg);margin-bottom:16px;">📋 旅行预览</h3>
        <div id="previewContent" style="font-size:13px;color:var(--muted-fg);line-height:2;"></div>
      </div>
    </div>
  </div>
</main>

<script src="pages/create.js"></script>
</body>
</html>
