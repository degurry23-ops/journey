<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的旅行 — Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="storage.js"></script>
<script src="api-bridge.js"></script>
<script src="utils.js"></script>
<style>
  .trip-card { display: flex; gap: 16px; align-items: center; cursor: pointer; text-decoration: none; color: inherit; }
  .trip-card .icon { width: 52px; height: 52px; border-radius: var(--radius); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .trip-card .icon.blue { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .trip-card .icon.green { background: linear-gradient(135deg, #10B981, #34D399); }
  .trip-card .icon.amber { background: linear-gradient(135deg, #F59E0B, #FBBF24); }
  .trip-card .icon.purple { background: linear-gradient(135deg, #8B5CF6, #A78BFA); }
  .trip-card .info { flex: 1; min-width: 0; }
  .trip-card .name { font-weight: 600; font-size: 16px; }
  .trip-card .meta { font-size: 13px; color: var(--muted-fg); margin-top: 2px; }
  .tab-bar { display: flex; gap: 4px; background: var(--muted); border-radius: 999px; padding: 4px; overflow-x: auto; }
  .tab { flex: 1; min-width: 80px; padding: 10px 16px; border-radius: 999px; border: none; background: 0 0; font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--muted-fg); cursor: pointer; white-space: nowrap; transition: all .2s; }
  .tab.active { background: var(--card); color: var(--fg); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .trips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  @media (max-width: 768px) { .trips-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="header-placeholder"></div>

<main class="container" style="padding-top:32px;padding-bottom:80px;">
  <h1 style="font-family:var(--font-display);font-size:2.5rem;margin-bottom:24px;">我的<span class="gradient-text">旅行</span></h1>
  <div class="tab-bar" style="margin-bottom:28px;">
    <button class="tab active" onclick="filterTrips('all', this)">全部 (0)</button>
    <button class="tab" onclick="filterTrips('planning', this)">规划中 (0)</button>
    <button class="tab" onclick="filterTrips('traveling', this)">进行中 (0)</button>
    <button class="tab" onclick="filterTrips('completed', this)">已完成 (0)</button>
  </div>
  <div class="trips-grid" id="tripList"></div>
  <a href="create.html" class="btn btn-primary btn-full btn-lg" style="margin-top:32px;">+ 创建新旅行</a>
</main>

<script src="components/header.js"></script>
<script>renderHeader('journeys');</script>
<script src="pages/journeys.js"></script>
</body>
</html>
